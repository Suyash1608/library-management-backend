spring.datasource.url=jdbc:mysql://localhost:3306/library_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=libraryManagementSecretKey2024SuperSecureKeyForJWTTokenGeneration
jwt.expiration=86400000

# Max books a member can borrow at once
library.max.borrow.limit=3
# Borrow duration in days
library.borrow.duration.days=14

server.port=8082
spring.application.name=library-management
